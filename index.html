<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#aeb9ef">
  <title>SKYLINE — Tower Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="game" aria-label="SKYLINE kule oyunu">
    <div id="scene" aria-hidden="true"></div>
    <div class="ambient ambient-one"></div><div class="ambient ambient-two"></div>

    <header class="hud" aria-live="polite">
      <div id="scoreWrap" class="score-wrap hidden"><span class="score-label">SKOR</span><strong id="score">0</strong></div>
      <button id="sound" class="icon-button" type="button" aria-label="Sesi kapat" aria-pressed="false"><span class="sound-lines"></span></button>
    </header>

    <section id="menu" class="screen active">
      <div class="brand-mark"><i></i><i></i><i></i></div>
      <p class="eyebrow">YÜKSEKLİĞİ YAKALA</p>
      <h1>SKYLINE</h1>
      <p class="tagline">Ritmi bul. Dengeyi kur. Gökyüzüne yüksel.</p>
      <button id="start" class="primary pulse" type="button">Başlamak için dokun</button>
      <p class="best">EN YÜKSEK <strong id="menuBest">0</strong></p>
    </section>

    <div id="perfect" class="perfect" aria-live="polite">PERFECT</div>

    <section id="gameOver" class="screen" aria-labelledby="gameOverTitle">
      <div class="panel">
        <p class="eyebrow">KULE TAMAMLANDI</p>
        <h2 id="gameOverTitle">Oyun Bitti</h2>
        <div class="results"><div><span>SKOR</span><strong id="finalScore">0</strong></div><div><span>EN YÜKSEK</span><strong id="finalBest">0</strong></div></div>
        <button id="replay" class="primary" type="button">Tekrar Oyna</button>
        <button id="home" class="secondary" type="button">Ana Menü</button>
      </div>
    </section>
    <p id="hint" class="hint hidden">YERLEŞTİRMEK İÇİN DOKUN</p>
  </main>
  <script type="module" src="game.js?v=16"></script>
</body>
</html>
